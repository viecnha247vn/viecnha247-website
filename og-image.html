<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>OG Image - ViệcNhà247</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Be Vietnam Pro', sans-serif;
  background: linear-gradient(135deg, #FFF8E7 0%, #F5E6D3 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}
.og-card {
  width: 1200px;
  height: 630px;
  background: linear-gradient(135deg, #FFF8E7 0%, #F5E6D3 50%, #E8D5A6 100%);
  border-radius: 24px;
  padding: 60px 80px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  position: relative;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
}
.og-card::before {
  content: '';
  position: absolute;
  top: -100px;
  right: -100px;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(232, 166, 39, 0.3) 0%, transparent 70%);
  border-radius: 50%;
}
.og-card::after {
  content: '';
  position: absolute;
  bottom: -50px;
  left: -50px;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(232, 166, 39, 0.2) 0%, transparent 70%);
  border-radius: 50%;
}
.header {
  display: flex;
  align-items: center;
  gap: 20px;
  position: relative;
  z-index: 1;
}
.logo-mark {
  width: 80px;
  height: 80px;
  background: linear-gradient(135deg, #E8A627 0%, #C68820 100%);
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 10px 30px rgba(232, 166, 39, 0.4);
}
.logo-svg {
  width: 50px;
  height: 50px;
}
.brand {
  font-size: 38px;
  font-weight: 800;
  color: #1a1a1a;
  letter-spacing: -0.02em;
}
.brand b {
  color: #C68820;
}
.main {
  position: relative;
  z-index: 1;
  margin-top: 20px;
}
.tagline {
  display: inline-block;
  background: rgba(232, 166, 39, 0.2);
  color: #8B6914;
  padding: 8px 20px;
  border-radius: 100px;
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 20px;
  letter-spacing: 0.05em;
}
h1 {
  font-size: 80px;
  font-weight: 900;
  color: #1a1a1a;
  line-height: 1.1;
  letter-spacing: -0.03em;
  margin-bottom: 24px;
}
h1 .accent {
  color: #C68820;
  font-style: italic;
  position: relative;
}
h1 .accent::after {
  content: '';
  position: absolute;
  bottom: 5px;
  left: 0;
  right: 0;
  height: 12px;
  background: rgba(232, 166, 39, 0.4);
  z-index: -1;
}
.subtitle {
  font-size: 26px;
  color: #4a4a4a;
  font-weight: 500;
  line-height: 1.4;
  max-width: 900px;
}
.footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
  z-index: 1;
  padding-top: 30px;
  border-top: 2px solid rgba(198, 136, 32, 0.2);
}
.services {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}
.service-tag {
  font-size: 22px;
}
.contact {
  text-align: right;
  font-size: 22px;
  font-weight: 700;
  color: #1a1a1a;
}
.contact .phone {
  color: #C68820;
  font-size: 28px;
  display: block;
  margin-bottom: 4px;
}
</style>
</head>
<body>
<div class="og-card">
  <div class="header">
    <div class="logo-mark">
      <svg class="logo-svg" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 13 L16 5 L28 13" fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
        <path d="M9 15 L16 25 L23 15" fill="none" stroke="white" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="brand">Việc<b>Nhà247</b></div>
  </div>

  <div class="main">
    <div class="tagline">● ĐANG PHỤC VỤ TPHCM</div>
    <h1>Dịch vụ gia đình<br><span class="accent">tận tâm</span>, đúng giờ</h1>
    <p class="subtitle">10 ngành chuyên sâu • CTV được đào tạo bài bản • Giá minh bạch • Bảo hiểm 50-100tr/đơn</p>
  </div>

  <div class="footer">
    <div class="services">
      <span class="service-tag">🧹</span>
      <span class="service-tag">⚡</span>
      <span class="service-tag">💧</span>
      <span class="service-tag">🚛</span>
      <span class="service-tag">🍳</span>
      <span class="service-tag">👴</span>
      <span class="service-tag">🛒</span>
      <span class="service-tag">🔨</span>
      <span class="service-tag">🧒</span>
      <span class="service-tag">🎓</span>
    </div>
    <div class="contact">
      <span class="phone">📞 084 9999 247</span>
      <span>viecnha247.vn</span>
    </div>
  </div>
</div>
</body>
</html>
